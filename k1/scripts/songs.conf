# OpenKE buzzer songs.
#
# One song per line:   name = <RTTTL string>
# Play it from G-code / the console with:   PLAY_TUNE SONG=<name>
#
# RTTTL is the old Nokia ringtone format (name:defaults:notes). Thousands of
# tunes are available online - just paste one in and give it a name.
# Sharps may be written '#' (standard) here, since this file is read directly
# by the buzzer player and not by Klipper.
#
# This file is NOT overwritten when you reinstall or update OpenKE, so any
# songs you add here are safe. Lines starting with '#' or ';' are comments.

mario = mario:d=4,o=5,b=100:16e6,16e6,32p,16e6,32p,16c6,16e6,16g6,8p,16g,8p,8c6,16p,16g,16p,16e,16p,16a,16b,16a#,16a,16g6,16e6,16g6,16a6,16f6,16g6,16e6,16c6,16d6,16b
zelda = zelda:d=4,o=5,b=125:32g,32f#,32d#,32a,32g#,32e,32g#,32c6
starwars = starwars:d=4,o=5,b=100:8d,8d,8d,8a#4,16f,8d,8a#4,16f,d,8a,8a,8a,8a#,16f,8c#,8a#4,16f,d

# Short jingles handy for print events:
success = success:d=4,o=6,b=140:8c,8e,8g,c
error = error:d=4,o=5,b=120:8c,8p,8c
