########################################
# Camera Settings Control  (guppycam-aware)
########################################
#
# Same feature as before (5 image controls, console macros, SAVE_VARIABLE
# persistence, boot re-apply) - but the controls are applied through the
# `cam_set` helper instead of calling v4l2-ctl directly. cam_set routes to
# guppycam's control socket when guppycam owns the camera, and falls back to
# v4l2-ctl for the stock cam_app stack. This guarantees only ONE process ever
# touches /dev/video4, which fixes the boot-time UVC control-bus wedge.

[gcode_shell_command cam_set]
command: sh /usr/data/guppycam/cam_set.sh
timeout: 5.0
verbose: True

# Kept for the stock stack / manual use (the stock v4l2-ctl shell command).
[gcode_shell_command v4l2-ctl]
command: v4l2-ctl
timeout: 5.0
verbose: True

# NOTE: this reuses the [save_variables] already provided by save-zoffset.cfg
# (filename: Helper-Script/variables.cfg). Klipper allows only ONE
# [save_variables] section, so we do NOT define another one here.

[gcode_macro CAM_SETTINGS]
description: Show current camera settings
gcode:
    RUN_SHELL_COMMAND CMD=cam_set PARAMS="--list"

[gcode_macro CAM_BRIGHTNESS]
description: min=50 / max=160
gcode:
    {% set brightness = params.BRIGHTNESS|default(printer.save_variables.variables.cam_brightness|default(115)) %}
    RUN_SHELL_COMMAND CMD=cam_set PARAMS="brightness "{brightness}
    SAVE_VARIABLE VARIABLE=cam_brightness VALUE={brightness}

[gcode_macro CAM_CONTRAST]
description: min=50 / max=160
gcode:
    {% set contrast = params.CONTRAST|default(printer.save_variables.variables.cam_contrast|default(100)) %}
    RUN_SHELL_COMMAND CMD=cam_set PARAMS="contrast "{contrast}
    SAVE_VARIABLE VARIABLE=cam_contrast VALUE={contrast}

[gcode_macro CAM_SATURATION]
description: min=50 / max=160
gcode:
    {% set saturation = params.SATURATION|default(printer.save_variables.variables.cam_saturation|default(95)) %}
    RUN_SHELL_COMMAND CMD=cam_set PARAMS="saturation "{saturation}
    SAVE_VARIABLE VARIABLE=cam_saturation VALUE={saturation}

[gcode_macro CAM_HUE]
description: min=50 / max=160
gcode:
    {% set hue = params.HUE|default(printer.save_variables.variables.cam_hue|default(50)) %}
    RUN_SHELL_COMMAND CMD=cam_set PARAMS="hue "{hue}
    SAVE_VARIABLE VARIABLE=cam_hue VALUE={hue}

[gcode_macro CAM_WHITE_BALANCE_TEMPERATURE_AUTO]
description: disable=0 / enable=1
gcode:
    {% set white_balance_temperature_auto = params.WHITE_BALANCE_TEMPERATURE_AUTO|default(printer.save_variables.variables.cam_wb_auto|default(1)) %}
    RUN_SHELL_COMMAND CMD=cam_set PARAMS="white_balance_temperature_auto "{white_balance_temperature_auto}
    SAVE_VARIABLE VARIABLE=cam_wb_auto VALUE={white_balance_temperature_auto}

########################################
# Re-apply saved camera settings on boot
########################################
# Safe now: cam_set routes to guppycam's socket (no 2nd opener of /dev/video4)
# when guppycam owns the camera, and guppycam also applies the saved values
# itself at startup (--cam-ctrl) as the authoritative boot-time application.
[gcode_macro APPLY_CAM_SETTINGS]
description: Re-apply all saved camera image settings
gcode:
    {% set v = printer.save_variables.variables %}
    RUN_SHELL_COMMAND CMD=cam_set PARAMS="brightness "{v.cam_brightness|default(115)}
    RUN_SHELL_COMMAND CMD=cam_set PARAMS="contrast "{v.cam_contrast|default(100)}
    RUN_SHELL_COMMAND CMD=cam_set PARAMS="saturation "{v.cam_saturation|default(95)}
    RUN_SHELL_COMMAND CMD=cam_set PARAMS="hue "{v.cam_hue|default(50)}
    RUN_SHELL_COMMAND CMD=cam_set PARAMS="white_balance_temperature_auto "{v.cam_wb_auto|default(1)}

[delayed_gcode APPLY_CAM_SETTINGS_ON_BOOT]
initial_duration: 20
gcode:
    APPLY_CAM_SETTINGS
    UPDATE_DELAYED_GCODE ID=APPLY_CAM_SETTINGS_RETRY DURATION=40

[delayed_gcode APPLY_CAM_SETTINGS_RETRY]
gcode:
    APPLY_CAM_SETTINGS
