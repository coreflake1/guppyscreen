# Axis Twist Compensation — Ender-3 V3 KE values.
# Placed in the GuppyScreen include dir (picked up by [include GuppyScreen/*.cfg]).
# These bounds are correct for the KE's 220x220 bed; the saved correction (z_compensations)
# is written by SAVE_CONFIG after you run AXIS_TWIST_COMPENSATION_CALIBRATE.
[axis_twist_compensation]
calibrate_start_x: 20
calibrate_end_x: 200
calibrate_y: 110
