# # # Adaptive Meshing # # #

# Heads up! If you have any other BED_MESH_CALIBRATE macros defined elsewhere in your config, you will need to comment out / remove them for this to work. (Klicky/Euclid Probe)
# You will also need to be sure that [exclude_object] is defined in printer.cfg, and your slicer is labeling objects.

# This delegates to Klipper's own native adaptive mesh (BED_MESH_CALIBRATE ADAPTIVE=1) -
# see patch_bed_mesh.py, which is what adds ADAPTIVE=1 support to the KE's Klipper (its
# stock bed_mesh.py predates the upstream merge and doesn't have it at all).
#
# Note: no probe-point randomization here (some third-party adaptive-mesh macros offer
# this to spread wear from nozzle-based probes) - no native equivalent, and not needed on
# this printer's probe anyway.

[gcode_macro ADAPTIVE_BED_MESH_CALIBRATE]
gcode:
    {% set settings = printer["gcode_macro _OPENKE_ADAPTIVE_SETTINGS"] %}
    {% set probe_dock_enable = settings.probe_dock_enable | abs %}
    {% set attach_macro = settings.attach_macro | string %}
    {% set detach_macro = settings.detach_macro | string %}
    {% set mesh_margin = settings.mesh_margin | float %}

    {% if not printer.exclude_object.objects %}
        RESPOND TYPE=command MSG="No objects detected! Check your gcode and make sure that EXCLUDE_OBJECT_DEFINE is happening before BED_MESH_CALIBRATE is called. Defaulting to regular meshing."
    {% endif %}

    {% if probe_dock_enable == True %}
        {attach_macro}                                                                                                              # Attach/deploy a probe if the probe is stored somewhere outside of the print area
    {% endif %}

    BED_MESH_CALIBRATE ADAPTIVE=1 ADAPTIVE_MARGIN={mesh_margin}

    {% if probe_dock_enable == True %}
        {detach_macro}                                                                                                              # Detach/stow a probe if the probe is stored somewhere outside of the print area
    {% endif %}
