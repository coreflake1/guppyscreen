# # # Start Print # # #
#
# Optional convenience wrapper: one macro call instead of hand-copying the
# home -> heat -> mesh -> park -> heat -> purge sequence into your slicer's
# start G-code. ADAPTIVE_BED_MESH_CALIBRATE / SMART_PARK / LINE_PURGE stay
# fully usable on their own for anyone who wants to build a custom sequence
# instead - this is purely additive, nothing else changes if you never call it.
#
# Required: BED_TEMP=<c> EXTRUDER_TEMP=<c>
# Optional: BRIM_WIDTH=<mm>   - from your slicer (e.g. OrcaSlicer's [brim_width]);
#                               grows the mesh/park/purge margin to clear it. Default 0.
#           SKIP_MESH=1       - skip ADAPTIVE_BED_MESH_CALIBRATE (e.g. you already meshed)
#           SKIP_PARK=1       - skip SMART_PARK
#           SKIP_PURGE=1      - skip LINE_PURGE

[gcode_macro START_PRINT]
description: Home, heat, adaptive-mesh, park, and purge in one call. Needs BED_TEMP= and EXTRUDER_TEMP=; BRIM_WIDTH=/SKIP_MESH=/SKIP_PARK=/SKIP_PURGE= are optional - see modules/Start_Print.cfg
gcode:
    {% if params.BED_TEMP is not defined or params.EXTRUDER_TEMP is not defined %}
        {action_raise_error("START_PRINT requires BED_TEMP=<c> and EXTRUDER_TEMP=<c>")}
    {% endif %}

    {% set bed_temp = params.BED_TEMP | float %}
    {% set extruder_temp = params.EXTRUDER_TEMP | float %}
    {% set brim_width = params.BRIM_WIDTH | default(0) | float %}
    {% set skip_mesh = params.SKIP_MESH | default(0) | int %}
    {% set skip_park = params.SKIP_PARK | default(0) | int %}
    {% set skip_purge = params.SKIP_PURGE | default(0) | int %}

    M140 S{bed_temp}                                        # Start heating bed (don't wait)
    G28 X Y                                                 # Home XY
    M190 S{bed_temp}                                        # Wait for bed temp
    G28 Z                                                   # Home Z (loads the saved bed_mesh profile)

    {% if not skip_mesh %}
        ADAPTIVE_BED_MESH_CALIBRATE MARGIN={brim_width + 5}
    {% endif %}

    M104 S{extruder_temp}                                   # Start heating nozzle (don't wait)

    {% if not skip_park %}
        SMART_PARK MARGIN={brim_width + 10}
    {% endif %}

    M109 S{extruder_temp}                                   # Wait for nozzle temp

    {% if not skip_purge %}
        LINE_PURGE MARGIN={brim_width + 10}                 # Handles its own extrusion-mode/E-reset internally
    {% endif %}
