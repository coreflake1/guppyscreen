# Below you can include specific modules depending on what you want enabled:

[include ./modules/Adaptive_Meshing.cfg]    # Meshes just the print area, using Klipper's own native adaptive mesh
[include ./modules/Line_Purge.cfg]          # Purges a line next to the print area instead of a fixed spot
[include ./modules/Smart_Park.cfg]          # Parks the printhead near the print area for final heating

[gcode_macro _OPENKE_ADAPTIVE_SETTINGS]
description: Adjustable settings for adaptive meshing, purging, and parking

variable_verbose_enable: True               # Set to True for extra console info while these run. Useful for debugging.

variable_mesh_margin: 0                     # Expands the adaptive mesh area in millimeters if desired. Leave at 0 to disable.
                                             # (Fallback only - ADAPTIVE_BED_MESH_CALIBRATE MARGIN=<mm> overrides this per call.)

variable_probe_dock_enable: False           # Set to True to enable the usage of a dockable probe.      # ---------------------------------------------
variable_attach_macro: 'Attach_Probe'       # The macro that is used to attach the probe.               # Klicky Probe:   'Attach_Probe' | 'Dock_Probe'
variable_detach_macro: 'Dock_Probe'         # The macro that is used to store the probe.                # Euclid Probe:   'Deploy_Probe' | 'Stow_Probe'
                                                                                                        # Legacy Gcode:   'M401'         | 'M402'

variable_purge_height: 0.8                  # Z position of nozzle during purge, default is 0.8.
variable_tip_distance: 0                    # Distance between tip of filament and nozzle before purge. Should be similar to PRINT_END final retract amount.
variable_purge_margin: 10                   # Distance the purge will be in front of the print area, default is 10.
                                             # (Fallback only - LINE_PURGE/SMART_PARK MARGIN=<mm> overrides this per call.)
variable_purge_amount: 30                   # Amount of filament to be purged prior to printing.
variable_flow_rate: 12                      # Flow rate of purge in mm3/s. Default is 12.

variable_smart_park_height: 10              # Z position for Smart Park, default is 10.

gcode: # Gcode section left intentionally blank. Do not disturb.

    {action_respond_info(" Running the _OPENKE_ADAPTIVE_SETTINGS macro does nothing, it is only used for storing settings. ")}
