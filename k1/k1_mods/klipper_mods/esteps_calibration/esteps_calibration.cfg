########################################
# E-Steps / Rotation Distance Calibration
########################################
# OpenKE-original macro (not ported from Creality) - addresses
# https://github.com/coreflake1/guppyscreen/issues/4
#
# Guided calibration following the standard mark-extrude-measure procedure:
# https://ellis3dp.com/Print-Tuning-Guide/articles/extruder_calibration.html
#
# The KE is direct drive, so this always heats the hotend first - unlike a
# Bowden setup (which can be disconnected and tested cold), direct drive has
# no way to extrude without pushing filament through the hot melt zone.
#
# Usage from the GuppyScreen console (or Mainsail/any G-code terminal):
#   1. CALIBRATE_ESTEPS       - heats up, tells you where to mark the filament,
#                                then extrudes a measured length at 1mm/s
#   2. Measure what's left of your mark with a ruler
#   3. CALIBRATE_ESTEPS_APPLY MEASURED=<mm remaining on your mark>
#                              - computes and applies the corrected
#                                rotation_distance, persisted across reboots
#   Re-run CALIBRATE_ESTEPS to verify; repeat until the extruded length matches
#   what you commanded.
#
# This printer's [idle_timeout] is effectively disabled (factory_printer.cfg
# sets it to ~3 years), so Klipper itself will never auto-shutoff a heater
# left on. If you heat up and don't press Extrude or Cancel within 2 minutes,
# _CALIBRATE_ESTEPS_TIMEOUT below cancels the calibration and cools down on
# its own, so filament doesn't sit parked in a hot nozzle indefinitely.

[gcode_macro SET_EXTRUDER_ROTATION_DISTANCE]
description: Set the extruder's rotation_distance and persist it across reboots
rename_existing: _SET_EXTRUDER_ROTATION_DISTANCE
gcode:
  _SET_EXTRUDER_ROTATION_DISTANCE {% for p in params %}{'%s=%s '% (p, params[p])}{% endfor %}
  {% if 'DISTANCE' in params %}
    SAVE_VARIABLE VARIABLE=extruder_rotation_distance VALUE={params.DISTANCE}
  {% endif %}


[delayed_gcode LOAD_EXTRUDER_ROTATION_DISTANCE]
initial_duration: 2
gcode:
  {% if printer.save_variables.variables.extruder_rotation_distance %}
    {% set rd = printer.save_variables.variables.extruder_rotation_distance %}
    _SET_EXTRUDER_ROTATION_DISTANCE DISTANCE={rd}
    RESPOND TYPE=command MSG="Loaded extruder rotation_distance from variables.cfg: {rd}"
  {% endif %}


[delayed_gcode _CALIBRATE_ESTEPS_TIMEOUT]
gcode:
  RESTORE_GCODE_STATE NAME=calibrate_esteps
  M104 S0
  RESPOND TYPE=command MSG="ESTEPS_CANCELLED"
  RESPOND TYPE=command MSG="E-Steps Calibration timed out waiting for a response (2 min) - hotend is cooling down. Run CALIBRATE_ESTEPS again when you're ready."


[gcode_macro CALIBRATE_ESTEPS]
description: Step 1/2 of e-steps calibration - heats up, then extrudes a measured length so you can check filament flow accuracy
gcode:
  {% set temp = params.TEMP|default(200)|float %}
  {% set length = params.LENGTH|default(100)|float %}
  {% set mark = params.MARK|default(120)|float %}
  {% set speed = params.SPEED|default(60)|float %}

  {% if mark <= length %}
    RESPOND TYPE=error MSG="MARK ({mark}mm) must be longer than LENGTH ({length}mm) so the mark doesn't get pulled into the extruder before it's done."
  {% else %}
    RESPOND TYPE=command MSG="=== E-Steps Calibration (step 1/2) ==="
    RESPOND TYPE=command MSG="Heating to {temp}C (returns immediately if already there). The hotend must be at temp: filament won't flow cold, and on this direct-drive extruder there's no way to test without pushing through the melt zone."
    RESPOND TYPE=command MSG="ESTEPS_HEATING TARGET={temp}"
    SAVE_GCODE_STATE NAME=calibrate_esteps
    M83
    M109 S{temp}
    RESPOND TYPE=command MSG="At temp. Get a ruler and a small piece of tape (tape marks more precisely than a pen)."
    RESPOND TYPE=command MSG="Measure {mark}mm up from where the filament feeds into the top of the extruder and wrap the tape around the filament at that exact spot."
    RESPOND TYPE=command MSG="ESTEPS_READY MARK={mark} LENGTH={length} SPEED={speed}"
    RESPOND TYPE=command MSG="Tape marked? Run: _CALIBRATE_ESTEPS_EXTRUDE LENGTH={length} SPEED={speed} MARK={mark}   (or cancel: _CALIBRATE_ESTEPS_CANCEL)"
    UPDATE_DELAYED_GCODE ID=_CALIBRATE_ESTEPS_TIMEOUT DURATION=120
  {% endif %}


[gcode_macro _CALIBRATE_ESTEPS_CANCEL]
gcode:
  UPDATE_DELAYED_GCODE ID=_CALIBRATE_ESTEPS_TIMEOUT DURATION=0
  RESTORE_GCODE_STATE NAME=calibrate_esteps
  M104 S0
  RESPOND TYPE=command MSG="ESTEPS_CANCELLED"
  RESPOND TYPE=command MSG="Calibration cancelled, hotend is cooling down."


[gcode_macro _CALIBRATE_ESTEPS_EXTRUDE]
gcode:
  {% set length = params.LENGTH|float %}
  {% set speed = params.SPEED|float %}
  {% set mark = params.MARK|float %}
  {% set chunk = 20.0 %}
  {% set num_full = (length / chunk) | int %}
  {% set remainder = length - (num_full * chunk) %}
  {% set fed = namespace(mm=0) %}
  UPDATE_DELAYED_GCODE ID=_CALIBRATE_ESTEPS_TIMEOUT DURATION=0
  RESPOND TYPE=command MSG="ESTEPS_PROGRESS FED=0 TOTAL={"%.0f" % length}"
  {% for i in range(num_full) %}
    G1 E{chunk} F{speed}
    M400
    {% set fed.mm = fed.mm + chunk %}
    RESPOND TYPE=command MSG="ESTEPS_PROGRESS FED={"%.0f" % fed.mm} TOTAL={"%.0f" % length}"
  {% endfor %}
  {% if remainder > 0.01 %}
    G1 E{remainder} F{speed}
    M400
    {% set fed.mm = fed.mm + remainder %}
    RESPOND TYPE=command MSG="ESTEPS_PROGRESS FED={"%.0f" % fed.mm} TOTAL={"%.0f" % length}"
  {% endif %}
  RESTORE_GCODE_STATE NAME=calibrate_esteps
  RESPOND TYPE=command MSG="ESTEPS_DONE MARK={"%.0f" % mark} LENGTH={"%.0f" % length}"
  RESPOND TYPE=command MSG="Done extruding {"%.0f" % length}mm. Now measure the gap from the extruder entry up to your tape mark with the ruler - that's how much filament is LEFT of your original {"%.0f" % mark}mm mark. Then run: CALIBRATE_ESTEPS_APPLY MEASURED=<that remaining distance> MARK={"%.0f" % mark} LENGTH={"%.0f" % length}"


[gcode_macro CALIBRATE_ESTEPS_APPLY]
description: Step 2/2 of e-steps calibration - computes and applies the corrected rotation_distance from your measurement
gcode:
  {% if 'MEASURED' not in params %}
    RESPOND TYPE=error MSG="Usage: CALIBRATE_ESTEPS_APPLY MEASURED=<mm remaining between the extruder entry and your tape mark> [MARK=120] [LENGTH=100]"
  {% else %}
    {% set mark = params.MARK|default(120)|float %}
    {% set commanded = params.LENGTH|default(100)|float %}
    {% set measured = params.MEASURED|float %}
    {% set actual = mark - measured %}
    {% if actual <= 0 %}
      RESPOND TYPE=error MSG="That doesn't add up ({mark}mm mark - {measured}mm remaining = {actual}mm extruded). MEASURED should be the distance still left between the extruder and your mark, not the distance the mark moved - double check and re-measure."
    {% else %}
      {% if printer.save_variables.variables.extruder_rotation_distance %}
        {% set old_rd = printer.save_variables.variables.extruder_rotation_distance|float %}
      {% else %}
        {% set old_rd = printer.configfile.settings.extruder.rotation_distance|float %}
      {% endif %}
      {% set new_rd = old_rd * (actual / commanded) %}
      SET_EXTRUDER_ROTATION_DISTANCE DISTANCE={"%.4f" % new_rd}
      RESPOND TYPE=command MSG="ESTEPS_APPLIED OLD={"%.4f" % old_rd} NEW={"%.4f" % new_rd} COMMANDED={"%.1f" % commanded} ACTUAL={"%.1f" % actual}"
      RESPOND TYPE=command MSG="=== E-Steps Calibration (step 2/2) ==="
      RESPOND TYPE=command MSG="You commanded {"%.1f" % commanded}mm and actually got {"%.1f" % actual}mm. rotation_distance: {"%.4f" % old_rd} -> {"%.4f" % new_rd} - saved, no need to re-enter it."
      {% if (actual - commanded) | abs < 0.5 %}
        RESPOND TYPE=command MSG="That's within 0.5mm of the target - close enough, you're done."
      {% else %}
        RESPOND TYPE=command MSG="Run CALIBRATE_ESTEPS again to verify with the new value - it should now extrude much closer to {"%.0f" % commanded}mm. Repeat until it does."
        RESPOND TYPE=command MSG="If you get a different actual length every time you repeat this test, that's not a calibration problem - it points to an extruder issue (skipping steps, loose grub screw, worn gears, etc.) that calibration alone won't fix."
      {% endif %}
    {% endif %}
  {% endif %}
