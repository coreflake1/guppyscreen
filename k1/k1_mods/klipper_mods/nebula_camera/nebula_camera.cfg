# OpenKE — Creality Nebula camera: image tuning that persists across reboots.
#
# Ships the CAM_* macros to actually set brightness/contrast/saturation/hue
# (previously only available via a separate Creality Helper Script install),
# plus the boot-reapply logic so the Nebula's washed-out stock defaults don't
# come back after a reboot. Self-contained: needs only gcode_shell_command
# (installed by OpenKE) and v4l2-ctl on the device (present on Nebula setups).
# The camera's controls live on /dev/video4.
#
# Uses whichever [save_variables] section is already active (installer adds
# one if none exists yet) — Klipper allows only one per config, so these
# macros don't define their own.

[gcode_shell_command guppy_v4l2]
command: v4l2-ctl
timeout: 10.0
verbose: False

[gcode_macro CAM_BRIGHTNESS]
description: Set + save camera brightness (min=50 / max=160)
gcode:
    {% set brightness = params.BRIGHTNESS|default(printer.save_variables.variables.cam_brightness|default(115)) %}
    RUN_SHELL_COMMAND CMD=guppy_v4l2 PARAMS="-d /dev/video4 --set-ctrl brightness={brightness}"
    SAVE_VARIABLE VARIABLE=cam_brightness VALUE={brightness}

[gcode_macro CAM_CONTRAST]
description: Set + save camera contrast (min=50 / max=160)
gcode:
    {% set contrast = params.CONTRAST|default(printer.save_variables.variables.cam_contrast|default(100)) %}
    RUN_SHELL_COMMAND CMD=guppy_v4l2 PARAMS="-d /dev/video4 --set-ctrl contrast={contrast}"
    SAVE_VARIABLE VARIABLE=cam_contrast VALUE={contrast}

[gcode_macro CAM_SATURATION]
description: Set + save camera saturation (min=50 / max=160)
gcode:
    {% set saturation = params.SATURATION|default(printer.save_variables.variables.cam_saturation|default(95)) %}
    RUN_SHELL_COMMAND CMD=guppy_v4l2 PARAMS="-d /dev/video4 --set-ctrl saturation={saturation}"
    SAVE_VARIABLE VARIABLE=cam_saturation VALUE={saturation}

[gcode_macro CAM_HUE]
description: Set + save camera hue (min=50 / max=160)
gcode:
    {% set hue = params.HUE|default(printer.save_variables.variables.cam_hue|default(50)) %}
    RUN_SHELL_COMMAND CMD=guppy_v4l2 PARAMS="-d /dev/video4 --set-ctrl hue={hue}"
    SAVE_VARIABLE VARIABLE=cam_hue VALUE={hue}

[gcode_macro CAM_SETTINGS]
description: Show the currently saved camera image settings
gcode:
    {% set v = printer.save_variables.variables %}
    RESPOND TYPE=command MSG="brightness={v.cam_brightness|default(115)} contrast={v.cam_contrast|default(100)} saturation={v.cam_saturation|default(95)} hue={v.cam_hue|default(50)}"

[gcode_macro APPLY_CAM_SETTINGS]
description: Re-apply Nebula camera image settings (persists across reboots)
gcode:
    {% set v = printer.save_variables.variables if printer.save_variables is defined else {} %}
    RUN_SHELL_COMMAND CMD=guppy_v4l2 PARAMS="-d /dev/video4 --set-ctrl brightness={v.cam_brightness|default(115)}"
    RUN_SHELL_COMMAND CMD=guppy_v4l2 PARAMS="-d /dev/video4 --set-ctrl contrast={v.cam_contrast|default(100)}"
    RUN_SHELL_COMMAND CMD=guppy_v4l2 PARAMS="-d /dev/video4 --set-ctrl saturation={v.cam_saturation|default(95)}"
    RUN_SHELL_COMMAND CMD=guppy_v4l2 PARAMS="-d /dev/video4 --set-ctrl hue={v.cam_hue|default(50)}"

# Apply ~15 s after boot, then once more at 40 s (the camera stack can come up late).
[delayed_gcode APPLY_CAM_SETTINGS_ON_BOOT]
initial_duration: 15
gcode:
    APPLY_CAM_SETTINGS
    UPDATE_DELAYED_GCODE ID=APPLY_CAM_SETTINGS_RETRY DURATION=40

[delayed_gcode APPLY_CAM_SETTINGS_RETRY]
gcode:
    APPLY_CAM_SETTINGS
